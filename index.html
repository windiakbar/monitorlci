<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Data Previewer Compact Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: dark;
        }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Menghindari teks terseleksi saat ditekan lama di HP */
        }
        .loader {
            border: 3px solid #1e293b;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .card-data {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }
        .card-data:active {
            transform: scale(0.97);
            background-color: #334155;
        }
        .img-thumb {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #0f172a;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .badge-kategori {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Sticky Header Mobile -->
    <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-lg border-b border-slate-800 p-4 shadow-xl">
        <div class="max-w-md mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black text-white tracking-tight">MONITORING <span class="text-sky-500">DATA</span></h1>
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">REAL TIME SYNC</p>
                </div>
                <button onclick="fetchData()" class="p-2.5 bg-slate-800 text-sky-400 rounded-xl border border-slate-700 active:bg-sky-500 active:text-white transition-colors shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
            </div>
            
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari nama, tim, atau kelas..." 
                       class="w-full bg-slate-900/50 border border-slate-700 text-sm px-4 py-3 rounded-2xl focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none text-slate-200 placeholder-slate-500 shadow-inner">
                <div class="absolute right-4 top-3.5 text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20">
        <!-- Loading -->
        <div id="loading" class="flex flex-col items-center justify-center py-32">
            <div class="loader mb-4"></div>
            <p class="text-sm font-medium text-slate-500 animate-pulse">Menghubungkan ke server...</p>
        </div>

        <!-- Error -->
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-2xl text-center mb-6">
            <p id="errorText" class="text-sm font-bold"></p>
        </div>

        <!-- Data List -->
        <div id="dataContainer" class="grid grid-cols-1 gap-4 hidden">
            <!-- Cards injected here -->
        </div>

        <!-- Empty State -->
        <div id="noResult" class="hidden py-32 text-center">
            <div class="text-slate-700 mb-2 flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </div>
            <p class="text-slate-500 text-sm font-medium">Data tidak ditemukan</p>
        </div>
    </main>

    <!-- Photo Overlay -->
    <div id="imageModal" class="fixed inset-0 z-[100] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-sm" onclick="this.classList.add('hidden')">
        <div class="relative w-full max-w-lg">
            <button class="absolute -top-12 right-0 text-white/50 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <img id="modalImg" class="w-full h-auto rounded-2xl shadow-2xl ring-1 ring-white/10" src="">
        </div>
    </div>

    <script>
        const SHEET_ID = '1DxcnB94ZORp0e2Ln9MxOeCZubZYxeRA-NH5xLm8D5vE';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        let allData = [];

        async function fetchData() {
            const loading = document.getElementById('loading');
            const dataContainer = document.getElementById('dataContainer');
            const errorMsg = document.getElementById('errorMessage');

            loading.classList.remove('hidden');
            dataContainer.classList.add('hidden');
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Data Spreadsheet gagal diambil');
                const csvData = await response.text();
                processData(csvData);
            } catch (error) {
                document.getElementById('errorText').innerText = error.message;
                errorMsg.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        }

        function processData(csvText) {
            const rows = csvText.split('\n').map(row => {
                const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return matches ? matches.map(m => m.replace(/^"|"$/g, '')) : [];
            });

            allData = rows.slice(1).filter(row => row.length > 1).map(row => ({
                timestamp: row[0] || '-',
                pendaftar: row[1] || '-',
                nama: row[2] || '-',
                kategori: row[3] || '-',
                kelas: row[4] || '-',
                foto: row[5] || ''
            }));

            renderCards(allData);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dataContainer').classList.remove('hidden');
        }

        function renderCards(data) {
            const container = document.getElementById('dataContainer');
            const noResult = document.getElementById('noResult');
            container.innerHTML = '';

            if (data.length === 0) {
                noResult.classList.remove('hidden');
                return;
            }
            
            noResult.classList.add('hidden');
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "card-data p-4 rounded-3xl flex items-center gap-4 shadow-sm";
                
                // Drive Link Helper
                let displayUrl = 'https://via.placeholder.com/150/0f172a/334155?text=No+Photo';
                let hasPhoto = false;
                
                if (item.foto && item.foto.startsWith('http')) {
                    hasPhoto = true;
                    displayUrl = item.foto;
                    if(displayUrl.includes('drive.google.com')) {
                        const driveId = displayUrl.match(/[-\w]{25,}/);
                        if(driveId) displayUrl = `https://lh3.googleusercontent.com/d/${driveId[0]}=s300`;
                    }
                }

                card.innerHTML = `
                    <div class="relative flex-shrink-0" onclick="event.stopPropagation(); openModal('${item.foto}')">
                        <img src="${displayUrl}" class="img-thumb ring-1 ring-slate-700/50" 
                             onerror="this.src='https://via.placeholder.com/150/0f172a/334155?text=Err'">
                        ${hasPhoto ? '<div class="absolute -top-1 -right-1 bg-sky-500 w-4 h-4 rounded-full border-[3px] border-[#1e293b]"></div>' : ''}
                    </div>
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-slate-100 text-[15px] truncate">${item.nama}</h3>
                        </div>
                        <p class="text-[11px] text-slate-500 font-medium mb-2">Oleh: ${item.pendaftar}</p>
                        
                        <div class="flex items-center gap-2">
                            <span class="badge-kategori bg-sky-500/10 text-sky-400 border border-sky-500/20">
                                ${item.kategori}
                            </span>
                            <span class="text-[10px] text-slate-500 border-l border-slate-700 pl-2">
                                Kelas ${item.kelas}
                            </span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                         <span class="text-[9px] text-slate-600 font-mono">${item.timestamp.split(' ')[0]}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Search logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.pendaftar.toLowerCase().includes(term) || 
                item.nama.toLowerCase().includes(term) || 
                item.kategori.toLowerCase().includes(term) ||
                item.kelas.toLowerCase().includes(term)
            );
            renderCards(filtered);
        });

        function openModal(url) {
            if(!url || !url.startsWith('http')) return;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            
            let fullUrl = url;
            if(url.includes('drive.google.com')) {
                const driveId = url.match(/[-\w]{25,}/);
                if(driveId) fullUrl = `https://lh3.googleusercontent.com/d/${driveId[0]}=s1600`;
            }

            modalImg.src = fullUrl;
            modal.classList.remove('hidden');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
